<!DOCTYPE html>
<html>
<head>
    <title>My Colorful Website</title>

    <style>
        body {
            background-image: url('https://static.vecteezy.com/system/resources/thumbnails/035/040/581/small_2x/ai-generated-beautiful-nature-picture-free-photo.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: yellow;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
        }

        button {
            background-color: orange;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: red;
        }
    </style>

</head>

<body>

    <h1>Welcome to My Website 🌟</h1>

    <p>This is my beautiful website with background image!</p>

    <br><br>

    <button onclick="alert('Hello! Welcome 😊')">Click Me</button>

</body>
</html>
